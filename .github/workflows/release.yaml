name: Release Helm Charts

on:
  push:
    branches:
      - main
      - first-version-vre-chart

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Add Helm repositories
        run: |
          helm repo add jupyterhub https://hub.jupyter.org/helm-chart
          helm repo add reana https://volodymyrss.github.io/reana
          helm repo add nfs-ganesha https://kubernetes-sigs.github.io/nfs-ganesha-server-and-external-provisioner
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add prometheus https://prometheus-community.github.io/helm-charts
          helm repo add fluent https://fluent.github.io/helm-charts
          helm repo update

      - name: Set chart version automatically
        id: set_version
        run: |
          # Compute version from git describe
          git describe --tags --always --dirty
          VERSION=$(git describe --tags --dirty 2>/dev/null || echo "0.1.0-${GITHUB_SHA::8}")

          # Remove 'v' prefix if present
          VERSION=${VERSION#v}

          echo "Computed chart version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Update Chart.yaml with computed version
          sed -i "s/^version:.*/version: ${VERSION}/" vre/Chart.yaml

          # Verify the update
          echo "Updated Chart.yaml:"
          grep "^version:" vre/Chart.yaml

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: .
          config: .github/cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_SKIP_EXISTING: true
