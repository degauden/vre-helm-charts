# please revise and set all these values!

bootstrap:
  reanaAdminEmail: "admin@example.com"
  reanaAdminPassword: "defaultpassword"

jupyterhub:
  hub:
    config:
      RucioAuthenticator:
        # -- Credentials for accessing identity provider (IAM in this case). Must be set for authentication to work, must have token-exchange permissions in IAM.
        # During production deployment, these credentials are best set in a Kubernetes secret, and linked with GitOps settings. 
        client_id:
        client_secret:
        # -- URLs for the identity provider (IAM in this case). Must be set for authentication to work.
        authorize_url: https://iam-et.cloud.cnaf.infn.it/authorize
        token_url: https://iam-et.cloud.cnaf.infn.it/token
        userdata_url: https://iam-et.cloud.cnaf.infn.it/userinfo
        oauth_callback_url: https://vre.example.local/hub/oauth_callback
    
  singleuser:
    extraEnv:
      # -- These environment variables are used by the RucioAuthenticator to connect to RUCIO. They should be set according to the RUCIO instance you want to connect to. The example values are for the CERN VRE RUCIO instance, but they should be changed if you want to connect to a different RUCIO instance.
      RUCIO_NAME: "vre-rucio.cern.ch"
      RUCIO_DEFAULT_INSTANCE: "vre-rucio.cern.ch"
      RUCIO_BASE_URL: "https://vre-rucio.cern.ch"
      RUCIO_AUTH_URL: "https://vre-rucio-auth.cern.ch"
      RUCIO_WEBUI_URL: "https://vre-rucio-ui.cern.ch"
      RUCIO_DISPLAY_NAME: "RUCIO - CERN VRE"
      RUCIO_SITE_NAME: "CERN"

  ingress:
    ingressClassName: null
    hosts:
    # -- Set the host for the JupyterHub ingress. This should be set to the domain name you want to use for accessing JupyterHub. 
    # Note that callback URLs for authentication will be based on this domain.
    - vre.example.local

reana:
  shared_storage:
    backend: nfs
    volume_size: 1
    access_modes: ReadWriteMany

  secrets:
    login:
      iam:
        # IAM client for REANA
        consumer_key:
        consumer_secret:

    # these are set for initialization
    database:
      user: reana
      password: reana

  reana_hostname: "reana-vre.example.local"

  db_env_config:
    REANA_DB_NAME: "reana"
    REANA_DB_PORT: "5432"
    REANA_DB_HOST: "escape-vre-db"
    # There are two more environment variables that should be set in order
    # to connect to a database:
    # REANA_DB_USERNAME: containing the database user name.
    # REANA_DB_PASSWORD: containing the password for the user previously set.

  # -- These settings are used to configure the login options for REANA. 
  login:
    - name: "iam"
      type: "keycloak"
      config:
        title: "ET IAM"
        base_url: "https://iam-et.cloud.cnaf.infn.it"
        realm_url: "https://iam-et.cloud.cnaf.infn.it"
        auth_url: "https://iam-et.cloud.cnaf.infn.it/authorize"
        token_url: "https://iam-et.cloud.cnaf.infn.it/token"
        userinfo_url: "https://iam-et.cloud.cnaf.infn.it/userinfo"

  ingress:
    enabled: false

  traefik:
    enabled: false

  quota:
    default_disk_limit: 10737418240  # bytes (10 GiB)
    default_cpu_limit: 36000000      # milliseconds (10 hours)


nfs-server-provisioner:
  persistence:
    storageClass: standard
    size: 100M

  storageClass:
    # this name MUST start with helm release name (escape-vre in this case) to be picked up by the reana-db and reana-shared-volume subcharts
    name: escape-vre-shared-volume-storage-class

