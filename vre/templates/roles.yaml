# {{ include "escape-vre.fullname" . }}-bootstrap-sa sa allowed to do all operations. not amazon specific

apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "escape-vre.fullname" . }}-bootstrap-sa
---
# {{ include "escape-vre.fullname" . }}-bootstrap-role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "escape-vre.fullname" . }}-bootstrap-role
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
# {{ include "escape-vre.fullname" . }}-bootstrap-role-binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "escape-vre.fullname" . }}-bootstrap-role-binding
subjects:
- kind: ServiceAccount
  name: {{ include "escape-vre.fullname" . }}-bootstrap-sa
  apiGroup: ""
roleRef:
  kind: Role
  name: {{ include "escape-vre.fullname" . }}-bootstrap-role
  apiGroup: ""
  
  
  

