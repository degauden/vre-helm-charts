# TODO: should this be in reana chart?
{{ if .Values.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "escape-vre.fullname" . }}-bootstrap-{{ .Release.Revision }}
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "escape-vre.fullname" . }}-bootstrap-sa
      initContainers:
      - name: wait-for-db
        image: "{{ .Values.bootstrap.initImage.repository }}:{{ .Values.bootstrap.initImage.tag }}"
        imagePullPolicy: {{ .Values.bootstrap.initImage.pullPolicy }}
        command: ["/bin/sh", "-c"]
        env:
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: {{ include "escape-vre.fullname" . }}-db-secrets
              key: user
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "escape-vre.fullname" . }}-db-secrets
              key: password        
        args:
        - |
          set -ex
          echo "Waiting for REANA database to be ready..."
          instance_name={{ include "escape-vre.fullname" . }}

          while ! psql -h "${instance_name}-db" -d reana -c "SELECT 1"; do
                echo "Waiting for REANA database to be ready..."
                sleep 5
          done

          echo "REANA database is ready." 

      containers:
      - name: bootstrap
        image: "{{ .Values.bootstrap.image.repository }}:{{ .Values.bootstrap.image.tag }}"
        imagePullPolicy: {{ .Values.bootstrap.imagePullPolicy }}  
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -ex
          echo "Bootstrapping REANA..."
          
          kubernetes_namespace={{ .Release.Namespace }}
          instance_name={{ include "escape-vre.fullname" . }}
          admin_email={{ .Values.bootstrap.reanaAdminEmail | default "admin@example.com" }}
          admin_password={{ .Values.bootstrap.reanaAdminPassword }}

          
          kubectl exec -it deployment/${instance_name}-server  -- ./scripts/create-database.sh || echo "Database already exists, skipping creation."

          # Create admin user
          if ! admin_access_token=$(kubectl -n "${kubernetes_namespace}" exec "deployment/${instance_name}-server" -c rest-api -- \
                flask reana-admin create-admin-user --email "${admin_email}" --password "${admin_password}"); then
                # Output failures
                echo "${admin_access_token}"
                exit 1
          fi
          

          # Add token to secrets
          if kubectl -n "${kubernetes_namespace}" create secret generic "${instance_name}"-admin-access-token \
                --from-literal=ADMIN_ACCESS_TOKEN="${admin_access_token}"; then
                echo "Secret created successfully."
          else
                echo "Secret already exists, skipping creation."
                admin_access_token=$(kubectl -n "${kubernetes_namespace}" get secret "${instance_name}"-admin-access-token -o jsonpath='{.data.ADMIN_ACCESS_TOKEN}' | base64 -d)
          fi

          echo "Success! You may now set the following environment variables:"
          echo ""
          echo "  $ export REANA_SERVER_URL=https://localhost:30443  # or use your URL"
          echo "  $ export REANA_ACCESS_TOKEN=${admin_access_token}"
          echo ""
          echo "Please see http://docs.reana.io/getting-started/ on how to run your first REANA example."


{{end}}
