apiVersion: v2
name: escape-vre
version: 0.1.0-dev544a5f7
description: The Virtual Research Environment developed at CERN.
keywords:
  - jupyterhub
  - rucio
  - reana
home: https://vre-hub.github.io
sources:
  - https://github.com/vre-hub/vre

dependencies:
  - name: jupyterhub
    version: 3.3.7
    repository: https://hub.jupyter.org/helm-chart
    condition: jupyterhub.enabled

  - name: reana
    # for the latest alpha version, not working with indigo IAM
    # version: 0.95.0-alpha.2          

    # this is the latest stable version, has an issue with debug mode
    # version: 0.9.4
    # repository: https://reanahub.github.io/reana
    
    # this is a version working with indigo IAM and debug mode
    version: 0.9.4-1-gcd7dcb3-dev
    repository: https://volodymyrss.github.io/reana
    condition: reana.enabled

  - name: nfs-server-provisioner
    condition: nfs-server-provisioner.enabled
    version: 1.8.0
    repository: https://kubernetes-sigs.github.io/nfs-ganesha-server-and-external-provisioner
  
  - name: grafana
    condition: grafana.enabled
    version: 9.2.2
    repository: https://grafana.github.io/helm-charts

  - name: prometheus
    condition: prometheus.enabled
    version: 27.20.0
    repository: https://prometheus-community.github.io/helm-charts

  - name: loki
    condition: loki.enabled
    version: 6.30.1
    repository: https://grafana.github.io/helm-charts

  - name: fluent-bit
    version: 0.48.9
    condition: fluent-bit.enabled
    repository: https://fluent.github.io/helm-charts


maintainers:
  - name: VRE Team
    email: vre-team@example.com
    url: https://vre-hub.github.io

icon: https://vre-hub.github.io/img/favicon.ico
appVersion: 0.1.0
